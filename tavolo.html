<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tavolo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2 id="title"></h2>

<div id="players"></div>

<div id="sum">Somma: 0 / 21</div>

<button onclick="confirm()">Conferma mano</button>

</div>

<script>

const params=new URLSearchParams(location.search)
const name=params.get("name")

let table=JSON.parse(localStorage.getItem("tavolo_"+name))

document.getElementById("title").innerText=name

function render(){

let div=document.getElementById("players")
div.innerHTML=""

table.players.forEach((p,i)=>{

let dealer=(i==table.dealer)?"🃏":""

div.innerHTML+=`
<div class="player">

<span>${p.name} ${dealer}</span>

<input type="number" min="0" max="21"
oninput="update(${i},this.value)">

<button onclick="rete(${i})">RETE</button>

</div>
`

})

}

function update(i,val){

table.players[i].temp=parseInt(val)||0

check()

}

function rete(i){

let sum=0

table.players.forEach((p,j)=>{
if(j!=i) sum+=p.temp||0
})

table.players[i].temp=21-sum

render()

}

function check(){

let sum=0

table.players.forEach(p=>sum+=p.temp||0)

document.getElementById("sum").innerText="Somma: "+sum+" / 21"

}

function confirm(){

let sum=0

table.players.forEach(p=>sum+=p.temp||0)

if(sum!=21){
alert("La somma deve essere 21")
return
}

table.players.forEach(p=>{

p.score+=p.temp||0
p.history.push(p.temp||0)
p.temp=0

})

table.dealer=(table.dealer+1)%table.players.length

localStorage.setItem("tavolo_"+name,JSON.stringify(table))

render()

}

render()

</script>

</body>
</html>
