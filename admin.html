<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>Creazione tavolo</h2>

<label>Nome tavolo</label>
<input id="table">

<label>Giocatori (separati da virgola)</label>
<input id="players">

<label>Password tavolo</label>
<input id="pass">

<button onclick="create()">Crea tavolo</button>

<h3>Tavoli</h3>

<ul id="tables"></ul>

</div>

<script>

function create(){

let name=document.getElementById("table").value
let players=document.getElementById("players").value.split(",")
let pass=document.getElementById("pass").value

let table={
name:name,
pass:pass,
dealer:0,
players:players.map(p=>({
name:p.trim(),
score:0,
history:[]
}))
}

localStorage.setItem("tavolo_"+name,JSON.stringify(table))

load()

}

function load(){

let ul=document.getElementById("tables")
ul.innerHTML=""

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i)

if(key.startsWith("tavolo_")){

let data=JSON.parse(localStorage.getItem(key))

ul.innerHTML+=`
<li>
${data.name}
<button onclick="openTable('${data.name}')">Apri</button>
</li>
`

}

}

}

function openTable(name){

location="tavolo.html?name="+name

}

load()

</script>

</body>
</html>
