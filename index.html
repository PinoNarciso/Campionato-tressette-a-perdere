<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Campionato Tressette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🏆 Campionato Tressette</h1>

<button onclick="admin()">Area amministratore</button>

<table>

<thead>
<tr>
<th>Tavolo</th>
<th>Giocatore</th>
<th>Punti</th>
</tr>
</thead>

<tbody id="ranking"></tbody>

</table>

</div>

<script>

function loadRanking(){

let table=document.getElementById("ranking")
table.innerHTML=""

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i)

if(key.startsWith("tavolo_")){

let data=JSON.parse(localStorage.getItem(key))

data.players.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${data.name}</td>
<td>${p.name}</td>
<td>${p.score}</td>
</tr>
`

})

}

}

}

function admin(){

let pass=prompt("Password amministratore")

if(pass==="tressette"){
location="admin.html"
}else{
alert("Password errata")
}

}

loadRanking()

</script>

</body>
</html>
