<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Campionato Tressette</title>

<style>

body{
font-family:Segoe UI;
background:#f0f2f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

button{
padding:8px 12px;
border:none;
background:#3498db;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>🏆 Campionato Tressette</h2>

<button onclick="openAdmin()">Area Amministratore</button>

<table>

<thead>
<tr>
<th>Tavolo</th>
<th>Giocatore</th>
<th>Punti</th>
</tr>
</thead>

<tbody id="classifica"></tbody>

</table>

</div>

<script>

function load(){

const table=document.getElementById("classifica")
table.innerHTML=""

for(let i=0;i<localStorage.length;i++){

const key=localStorage.key(i)

if(key.startsWith("table_")){

const data=JSON.parse(localStorage.getItem(key))

data.players.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${data.name}</td>
<td>${p.name}</td>
<td>${p.score}</td>
</tr>
`

})

}

}

}

function openAdmin(){

let pass=prompt("Password amministratore")

if(pass==="admin123"){
window.location="admin.html"
}else{
alert("Password errata")
}

}

load()

</script>

</body>
</html>
