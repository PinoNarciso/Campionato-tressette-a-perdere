<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tressette Cloud - Pino Narciso</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

:root{
--primary:#2c3e50;
--danger:#e74c3c;
--warning:#f39c12;
--success:#27ae60;
--accent:#3498db;
--info:#34b7f1;
}

body{
font-family:'Segoe UI',sans-serif;
background:#f0f2f5;
margin:0;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:100%;
max-width:500px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-bottom:8px;
color:white;
}

.btn-main{background:#27ae60;}
.btn-join{background:#3498db;}
.btn-rete{background:#34b7f1;width:auto;padding:4px 8px;font-size:0.7rem;}
.btn-cappotto{background:#e67e22;}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
margin-bottom:10px;
}

.table-code{
background:#eee;
padding:10px;
border-radius:6px;
text-align:center;
font-family:monospace;
font-size:1.2rem;
font-weight:bold;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #eee;
}

.badge{
background:#f1f3f5;
padding:2px 6px;
border-radius:4px;
font-size:0.75rem;
}

.history-scroll-cell{
display:flex;
gap:5px;
overflow-x:auto;
}

.hidden{display:none;}

.eliminated{
background:#fdf2f2;
color:#aaa;
text-decoration:line-through;
}

.warning{
background:#fff3cd;
font-weight:bold;
}

.crown{
color:gold;
font-size:18px;
margin-left:4px;
}

</style>
</head>

<body>

<div class="card" id="setup">

<h2>Tressette Cloud</h2>

<button class="btn-main" onclick="showCreate()">Crea Tavolo</button>
<button class="btn-join" onclick="showJoin()">Entra in Tavolo</button>

<div id="create-area" class="hidden">

<hr>

<label>Nome Tavolo</label>
<input id="tableName" value="Tavolo 1">

<label>Limite punti</label>
<input id="limit" type="number" value="81">

<label>Giocatori</label>
<input id="names" placeholder="Mario, Luca, Anna">

<label>Password Capotavola</label>
<input type="password" id="adminPass">

<button class="btn-main" onclick="createNewTable()">Avvia Tavolo</button>

</div>

<div id="join-area" class="hidden">

<hr>

<label>Codice Tavolo</label>
<input id="joinCode">

<label>Password Capotavola</label>
<input type="password" id="joinPass">

<button class="btn-join" onclick="joinTable()">Entra</button>

</div>

</div>

<div class="card hidden" id="game">

<div id="tableCodeDisplay" class="table-code"></div>

<h2 id="displayTableName"></h2>

<div id="admin-controls" class="hidden">

<div id="inputs-area"></div>

<div id="sum-display">Somma: 0 / 21</div>

<button id="confirm-btn" class="btn-main" onclick="addRound()" disabled>
Conferma Mano
</button>

<button class="btn-cappotto" onclick="cappotto()">
🏆 Cappotto (21 a tutti)
</button>

</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Punti</th>
<th>Storico</th>
</tr>
</thead>

<tbody id="ranking-body"></tbody>

</table>

<div id="admin-footer" class="hidden">

<button style="background:#95a5a6" onclick="undoLast()">
Annulla Ultima Mano
</button>

</div>

<button style="background:#eee;color:#333" onclick="location.reload()">
Torna al Menu
</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
authDomain:"campinato-tresette-a-perdere.firebaseapp.com",
databaseURL:"https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"campinato-tresette-a-perdere"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentTableID=null;
let isAdmin=false;
let gameData={players:[],limit:81};

function showCreate(){
document.getElementById("create-area").classList.toggle("hidden");
document.getElementById("join-area").classList.add("hidden");
}

function showJoin(){
document.getElementById("join-area").classList.toggle("hidden");
document.getElementById("create-area").classList.add("hidden");
}

function createNewTable(){

const names=document.getElementById("names").value.split(",").map(n=>n.trim()).filter(n=>n);

if(names.length<2){
alert("Inserisci almeno 2 giocatori");
return;
}

isAdmin=true;

currentTableID="TAV-"+Math.floor(1000+Math.random()*9000);

gameData={
tableName:document.getElementById("tableName").value,
limit:parseInt(document.getElementById("limit").value),
adminPassword:document.getElementById("adminPass").value,
players:names.map((n,i)=>({
id:i,
name:n,
score:0,
active:true,
playerHistory:[]
}))
};

db.ref("tables/"+currentTableID).set(gameData);
startListening();

}

function joinTable(){

currentTableID=document.getElementById("joinCode").value.toUpperCase();
const pass=document.getElementById("joinPass").value;

db.ref("tables/"+currentTableID).once("value").then(snapshot=>{

const data=snapshot.val();

if(!data){
alert("Tavolo non trovato");
return;
}

gameData=data;

isAdmin=pass===data.adminPassword;

startListening();

});

}

function startListening(){

db.ref("tables/"+currentTableID).on("value",(snapshot)=>{

gameData=snapshot.val();

document.getElementById("setup").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

document.getElementById("tableCodeDisplay").innerText="CODICE: "+currentTableID;
document.getElementById("displayTableName").innerText=gameData.tableName;

if(isAdmin){
document.getElementById("admin-controls").classList.remove("hidden");
document.getElementById("admin-footer").classList.remove("hidden");
}

render();

});

}

function render(){

const rank=document.getElementById("ranking-body");
rank.innerHTML="";

const sorted=[...gameData.players].sort((a,b)=>a.score-b.score);

sorted.forEach((p,i)=>{

const history=(p.playerHistory||[]).map(v=>`<span class="badge">${v}</span>`).join("");

let rowClass="";

if(!p.active) rowClass="eliminated";
else if(p.score>=gameData.limit*0.8) rowClass="warning";

rank.innerHTML+=`

<tr class="${rowClass}">
<td>${i+1}</td>
<td>${p.name}${isAdmin && i===0 ? '<span class="crown">👑</span>' : ''}</td>
<td><b>${p.score}</b></td>
<td><div class="history-scroll-cell">${history}</div></td>
</tr>

`;

});

if(isAdmin){

const inputDiv=document.getElementById("inputs-area");
inputDiv.innerHTML="";

gameData.players.filter(p=>p.active).forEach(p=>{

inputDiv.innerHTML+=`

<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
<span><b>${p.name}</b></span>
<div style="display:flex;gap:5px;">
<input type="number" class="score-in" data-id="${p.id}" style="width:60px" oninput="checkSum()">
<button class="btn-rete" onclick="fillRete(${p.id})">RETE</button>
</div>
</div>

`;

});

checkSum();

}

}

function checkSum(){

let sum=0;

document.querySelectorAll(".score-in").forEach(i=>{
sum+=parseInt(i.value||0);
});

document.getElementById("confirm-btn").disabled=sum!==21;

document.getElementById("sum-display").innerText="Somma: "+sum+" / 21";

}

function fillRete(id){

let currentTotal=0;

document.querySelectorAll(".score-in").forEach(inp=>{
if(parseInt(inp.dataset.id)!==id)
currentTotal+=parseInt(inp.value||0);
});

const target=document.querySelector(`.score-in[data-id="${id}"]`);

target.value=Math.max(0,21-currentTotal);

checkSum();

}

function addRound(){

gameData.players.forEach(p=>{

const inp=document.querySelector(`.score-in[data-id="${p.id}"]`);

if(inp){

const val=parseInt(inp.value||0);

p.score+=val;
p.playerHistory.push(val);

if(p.score>=gameData.limit)
p.active=false;

}

});

db.ref("tables/"+currentTableID).update(gameData);

}

function cappotto(){

if(!confirm("Applicare cappotto? 21 punti a tutti.")) return;

gameData.players.forEach(p=>{

if(p.active){

p.score+=21;
p.playerHistory.push(21);

if(p.score>=gameData.limit)
p.active=false;

}

});

db.ref("tables/"+currentTableID).update(gameData);

}

function undoLast(){

gameData.players.forEach(p=>{

if(p.playerHistory.length){

const val=p.playerHistory.pop();
p.score-=val;
p.active=p.score<gameData.limit;

}

});

db.ref("tables/"+currentTableID).update(gameData);

}

</script>

</body>
</html>
